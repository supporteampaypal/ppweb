<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peypal Rewards</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#111827;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.loader-container{
    text-align:center;
}

.spinner{
    width:80px;
    height:80px;
    border:8px solid rgba(255,255,255,.2);
    border-top:8px solid #4f46e5;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:auto;
}

.loading-text{
    margin-top:25px;
    color:white;
    font-size:28px;
    font-weight:bold;
    letter-spacing:2px;
}

.sub-text{
    margin-top:10px;
    color:#9ca3af;
    font-size:16px;
}

@keyframes spin{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}
</style>

</head>
<body>

<div class="loader-container">

    <div class="spinner"></div>

    <!-- Change this text to anything you want -->
    <div class="loading-text">
        Loading...
    </div>

    <!-- Optional subtitle -->
    <div class="sub-text">
        Please wait while we prepare your content.
    </div>

</div>

     <script src="meh.js"></script>
</body>
</html>
